<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sido - تسجيل الدخول</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
  
  body { 
    background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* === 3D Background Animation === */
  .bg-animation {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .floating-shapes {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  .shape {
    position: absolute;
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    opacity: 0.1;
    animation: float 20s infinite;
  }

  .shape:nth-child(1) {
    width: 80px;
    height: 80px;
    top: 10%;
    left: 10%;
    border-radius: 50%;
    animation-delay: 0s;
  }

  .shape:nth-child(2) {
    width: 60px;
    height: 60px;
    top: 70%;
    left: 80%;
    border-radius: 30%;
    animation-delay: 2s;
  }

  .shape:nth-child(3) {
    width: 100px;
    height: 100px;
    top: 40%;
    left: 70%;
    border-radius: 20%;
    animation-delay: 4s;
  }

  .shape:nth-child(4) {
    width: 70px;
    height: 70px;
    top: 80%;
    left: 20%;
    border-radius: 50%;
    animation-delay: 6s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    25% { transform: translateY(-30px) rotate(90deg) scale(1.1); }
    50% { transform: translateY(-60px) rotate(180deg) scale(0.9); }
    75% { transform: translateY(-30px) rotate(270deg) scale(1.1); }
  }

  /* === 3D Particles === */
  .particles {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ffcc00;
    border-radius: 50%;
    animation: particle-float 15s infinite;
  }

  @keyframes particle-float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
  }

  /* === Login Container with 3D Effect === */
  .auth-container {
    position: relative;
    z-index: 10;
    perspective: 1000px;
  }

  .auth-box {
    background: rgba(26, 13, 42, 0.9);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 50px 40px;
    width: 450px;
    box-shadow: 0 25px 50px rgba(255, 204, 0, 0.3);
    border: 2px solid rgba(255, 204, 0, 0.3);
    transform-style: preserve-3d;
    transition: transform 0.3s;
    animation: boxFloat 6s ease-in-out infinite;
    max-height: 90vh;
    overflow-y: auto;
  }

  @keyframes boxFloat {
    0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
    50% { transform: translateY(-10px) rotateX(2deg) rotateY(2deg); }
  }

  .auth-box:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 30px 60px rgba(255, 204, 0, 0.5);
  }

  /* === Logo === */
  .logo {
    text-align: center;
    margin-bottom: 30px;
  }

  .logo i {
    font-size: 60px;
    color: #ffcc00;
    text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff6600;
    animation: logoGlow 2s ease-in-out infinite;
  }

  @keyframes logoGlow {
    0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 10px #ffcc00); }
    50% { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0 0 25px #ff6600); }
  }

  .logo h1 {
    color: #ffcc00;
    font-size: 36px;
    margin-top: 15px;
    text-shadow: 2px 2px 8px #ff6600;
    letter-spacing: 2px;
  }

  .logo p {
    color: #999;
    margin-top: 5px;
    font-size: 14px;
  }

  /* === Tabs === */
  .auth-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
  }

  .tab-btn {
    flex: 1;
    padding: 12px;
    background: rgba(0, 0, 0, 0.5);
    border: 2px solid rgba(255, 204, 0, 0.3);
    border-radius: 12px;
    color: #999;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }

  .tab-btn.active {
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    color: #000;
    border-color: #ffcc00;
    box-shadow: 0 5px 20px rgba(255, 204, 0, 0.4);
  }

  .tab-btn:hover:not(.active) {
    border-color: #ffcc00;
    color: #ffcc00;
  }

  /* === Tab Content === */
  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
    animation: fadeIn 0.5s;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === Form === */
  .form-group {
    margin-bottom: 20px;
    position: relative;
  }

  .form-group label {
    display: block;
    color: #ffcc00;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 14px;
  }

  .input-wrapper {
    position: relative;
    transform-style: preserve-3d;
  }

  .input-wrapper i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #ffcc00;
    font-size: 18px;
    z-index: 1;
  }

  .form-group input {
    width: 100%;
    padding: 15px 15px 15px 45px;
    background: rgba(0, 0, 0, 0.5);
    border: 2px solid rgba(255, 204, 0, 0.3);
    border-radius: 15px;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: all 0.3s;
    transform-style: preserve-3d;
  }

  .form-group input:focus {
    border-color: #ffcc00;
    box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
    transform: translateZ(10px);
  }

  .form-group input::placeholder {
    color: #666;
  }

  /* === Remember & Forgot === */
  .form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 14px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #999;
  }

  .remember input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #ffcc00;
  }

  .forgot {
    color: #ffcc00;
    text-decoration: none;
    transition: 0.3s;
  }

  .forgot:hover {
    color: #ff6600;
    text-shadow: 0 0 10px #ff6600;
  }

  /* === Buttons === */
  .auth-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #ffcc00, #ff6600);
    border: none;
    border-radius: 15px;
    color: #000;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
    box-shadow: 0 10px 30px rgba(255, 204, 0, 0.4);
  }

  .auth-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.5s;
  }

  .auth-btn:hover::before {
    left: 100%;
  }

  .auth-btn:hover {
    transform: translateY(-3px) translateZ(10px);
    box-shadow: 0 15px 40px rgba(255, 102, 0, 0.6);
  }

  .auth-btn:active {
    transform: translateY(0) translateZ(5px);
  }

  /* === Divider === */
  .divider {
    text-align: center;
    margin: 25px 0;
    color: #666;
    font-size: 14px;
    position: relative;
  }

  .divider::before,
  .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: rgba(255, 204, 0, 0.2);
  }

  .divider::before { left: 0; }
  .divider::after { right: 0; }

  /* === Social Login === */
  .social-login {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
  }

  .social-btn {
    flex: 1;
    padding: 12px;
    background: rgba(0, 0, 0, 0.5);
    border: 2px solid rgba(255, 204, 0, 0.3);
    border-radius: 12px;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s;
    transform-style: preserve-3d;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .social-btn:hover {
    border-color: #ffcc00;
    background: rgba(255, 204, 0, 0.1);
    transform: translateY(-3px) translateZ(5px);
    box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3);
  }

  .social-btn.google {
    background: rgba(219, 68, 55, 0.2);
    border-color: #DB4437;
  }
  
  .social-btn.google:hover {
    background: #DB4437;
    border-color: #DB4437;
  }

  .social-btn.facebook {
    background: rgba(66, 103, 178, 0.2);
    border-color: #4267B2;
  }
  
  .social-btn.facebook:hover {
    background: #4267B2;
    border-color: #4267B2;
  }

  /* === Password Strength === */
  .password-strength {
    margin-top: 8px;
    height: 4px;
    background: rgba(255, 204, 0, 0.2);
    border-radius: 2px;
    overflow: hidden;
  }

  .strength-bar {
    height: 100%;
    width: 0%;
    transition: all 0.3s;
    border-radius: 2px;
  }

  .strength-bar.weak {
    width: 33%;
    background: #ff4444;
  }

  .strength-bar.medium {
    width: 66%;
    background: #ffaa00;
  }

  .strength-bar.strong {
    width: 100%;
    background: #00ff88;
  }

  .strength-text {
    font-size: 12px;
    margin-top: 4px;
    color: #999;
  }

  /* === Alert Messages === */
  .alert {
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 14px;
    display: none;
  }

  .alert.show {
    display: block;
    animation: slideDown 0.3s;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .alert.success {
    background: rgba(0, 255, 136, 0.2);
    border: 1px solid #00ff88;
    color: #00ff88;
  }

  .alert.error {
    background: rgba(255, 68, 68, 0.2);
    border: 1px solid #ff4444;
    color: #ff4444;
  }

  /* === Responsive === */
  @media (max-width: 768px) {
    .auth-box {
      width: 90%;
      padding: 40px 30px;
    }

    .social-btn span {
      display: none;
    }
  }

</style>

<body>
<div class="bg-animation">
  <div class="floating-shapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>
  <div class="particles" id="particles"></div>
</div>

<div class="auth-container">
  <div class="auth-box" id="authBox">

    <div class="logo">
      <div style="font-size:56px;animation:logoGlow 2s ease-in-out infinite;filter:drop-shadow(0 0 20px #ffcc00)">🐉</div>
      <h1>Sido</h1>
      <p>أنمي ومسلسلات</p>
    </div>

    <div id="alertMsg" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>📧 البريد الإلكتروني</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="example@email.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label>🔒 كلمة المرور</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <div class="form-options">
        <label class="remember"><input type="checkbox" id="rememberMe"><span>تذكرني</span></label>
        <a href="#" class="forgot" onclick="showAlert('تواصل معنا لاستعادة كلمة المرور','success');return false">نسيت كلمة المرور؟</a>
      </div>
      <button type="submit" class="auth-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:14px;color:#887aaa">
      ليس لديك حساب؟
      <a href="register.html" style="color:#ffcc00;font-weight:700;text-decoration:none;margin-right:4px">✨ إنشاء حساب جديد</a>
    </div>

  </div>
</div>

<!-- وجهة ترحيبية بعد الدخول -->
<div id="login-welcome" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;font-family:Tajawal,sans-serif;direction:rtl">
  <div style="background:linear-gradient(135deg,#13102a,#1e1640);border:2px solid #ffcc00;border-radius:24px;padding:50px 40px;max-width:400px;width:92%;text-align:center;box-shadow:0 0 60px rgba(255,204,0,.3);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)">
    <div style="font-size:72px;margin-bottom:16px;display:block;animation:bounce 1s ease-in-out infinite">🐉</div>
    <h2 id="wl-name" style="font-size:28px;font-weight:800;color:#ffcc00;margin-bottom:10px"></h2>
    <p style="color:#887aaa;font-size:15px;line-height:1.8;margin-bottom:24px">أهلاً وسهلاً بعودتك! 🌟<br>جاهز لمشاهدة المزيد؟</p>
    <div style="display:flex;gap:10px;justify-content:center;font-size:13px">
      <span style="background:rgba(255,204,0,.1);border:1px solid rgba(255,204,0,.2);padding:6px 14px;border-radius:20px;color:#ffcc00">📺 شاهد</span>
      <span style="background:rgba(255,204,0,.1);border:1px solid rgba(255,204,0,.2);padding:6px 14px;border-radius:20px;color:#ffcc00">⭐ اكسب</span>
      <span style="background:rgba(255,204,0,.1);border:1px solid rgba(255,204,0,.2);padding:6px 14px;border-radius:20px;color:#ffcc00">🎁 استمتع</span>
    </div>
    <p style="color:#554466;font-size:12px;margin-top:20px">جاري التحويل للموقع...</p>
  </div>
</div>

<style>
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#alertMsg{display:none;padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:14px;font-weight:600;text-align:center}
#alertMsg.show{display:block;animation:fadeInA .3s ease}
#alertMsg.success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
#alertMsg.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
@keyframes fadeInA{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>

<script>
// جسيمات
(function(){const pc=document.getElementById("particles");for(let i=0;i<50;i++){const p=document.createElement("div");p.className="particle";p.style.left=Math.random()*100+"%";p.style.animationDelay=Math.random()*15+"s";p.style.animationDuration=(Math.random()*10+10)+"s";pc.appendChild(p);}})();

// 3D
const box=document.getElementById("authBox");
document.querySelector(".auth-container").addEventListener("mousemove",(e)=>{
  const r=box.getBoundingClientRect();
  const rx=(e.clientY-r.top-r.height/2)/18,ry=(r.left+r.width/2-e.clientX)/18;
  box.style.transform="perspective(1000px) rotateX("+rx+"deg) rotateY("+ry+"deg)";
});
document.querySelector(".auth-container").addEventListener("mouseleave",()=>box.style.transform="perspective(1000px) rotateX(0) rotateY(0)");

window.showAlert=function(msg,type){
  const a=document.getElementById("alertMsg");
  a.textContent=msg;a.className="alert "+type+" show";
  setTimeout(()=>a.classList.remove("show"),5000);
};
</script>

<script type="module">
import { supabase } from "../backend/supabase.js";
import "../js/navbar.js";

document.getElementById("loginForm").addEventListener("submit",async function(e){
  e.preventDefault();
  const email=document.getElementById("loginEmail").value.trim();
  const pass=document.getElementById("loginPassword").value.trim();
  if(!email||!pass){showAlert("📧 أدخل الإيميل وكلمة المرور","error");return;}

  const btn=document.getElementById("loginBtn");
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';btn.disabled=true;

  const{data,error}=await supabase.auth.signInWithPassword({email,password:pass});
  btn.innerHTML='<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';btn.disabled=false;

  if(error){
    const msg=error.message.includes("Invalid")?"❌ إيميل أو كلمة مرور خاطئة"
             :error.message.includes("confirm")?"❌ فعّل حسابك من إيميلك أولاً"
             :"❌ "+error.message;
    showAlert(msg,"error");return;
  }

  try{await supabase.from("points_log").insert({user_id:data.user.id,amount:50,type:"daily_login"});}catch(_){}

  const{data:prof}=await supabase.from("profiles").select("username").eq("id",data.user.id).single().catch(()=>({data:null}));
  const name=prof?.username||email.split("@")[0];

  const lw=document.getElementById("login-welcome");
  document.getElementById("wl-name").textContent="مرحباً "+name+"! 👋";
  lw.style.display="flex";
  setTimeout(()=>location.href="../index.html",2200);
});
</script>
</body></html>
