<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sido — قائمتي</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/navbar.css">
<style>
body{background:#0a0816;color:#f0eeff;margin:0;font-family:'Tajawal',sans-serif}
.page-hero{padding:36px 4% 28px;border-bottom:1px solid rgba(255,204,0,.12);background:linear-gradient(135deg,#0f0b20,#1a1035)}
.page-hero h1{font-size:26px;font-weight:800;color:#ffcc00;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.page-hero p{color:#887aaa;font-size:14px}
.content-wrap{padding:28px 4% 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:18px}
.card{background:#1a1535;border-radius:14px;overflow:hidden;border:1px solid rgba(124,58,237,.22);cursor:pointer;transition:.25s;position:relative}
.card:hover{transform:translateY(-6px);border-color:#ffcc00;box-shadow:0 14px 28px rgba(0,0,0,.5),0 0 14px rgba(255,204,0,.12)}
.card::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0;border-color:#ffcc00 transparent transparent transparent;transition:.22s}
.card:hover::after{border-width:18px 18px 0 0}
.card img{width:100%;height:250px;object-fit:cover;display:block}
.card-body{padding:12px 14px}
.card-title{font-size:14px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:#887aaa;margin-bottom:10px}
.btns{display:flex;gap:8px}
.watch-btn{flex:1;padding:8px;background:linear-gradient(90deg,#ffcc00,#ff9900);color:#000;border:none;border-radius:20px;font-weight:700;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.18s;clip-path:polygon(0 0,92% 0,100% 50%,92% 100%,0 100%)}
.watch-btn:hover{transform:scale(1.04)}
.rm-btn{padding:8px 10px;background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.22);border-radius:20px;cursor:pointer;font-size:12px;transition:.18s}
.rm-btn:hover{background:rgba(239,68,68,.2)}
.empty{text-align:center;padding:80px 20px;color:#887aaa;grid-column:1/-1}
.empty i{font-size:60px;color:#221a40;display:block;margin-bottom:14px}
.empty a{color:#ffcc00;text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="page-hero">
  <h1><i class="fas fa-bookmark"></i> قائمتي</h1>
  <p>الأنمي والمسلسلات التي حفظتها للمشاهدة لاحقاً</p>
</div>
<div class="content-wrap">
  <div class="grid" id="wlGrid">
    <div class="empty"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>
  </div>
</div>
<script type="module">
import { supabase } from "../backend/supabase.js";
import "../js/navbar.js";
function san(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML;}
async function load(){
  const {data:auth} = await supabase.auth.getUser();
  if(!auth?.user){location.href="login.html";return;}
  const uid = auth.user.id;
  const {data} = await supabase.from("watchlist").select("anime_id,animes(*)").eq("user_id",uid);
  const items = (data||[]).map(r=>r.animes).filter(Boolean);
  const g = document.getElementById("wlGrid");
  if(!items.length){
    g.innerHTML=`<div class="empty"><i class="fas fa-bookmark"></i><h3 style="color:#887aaa;margin-bottom:8px">قائمتك فارغة</h3><p>تصفح <a href="anime.html">الأنمي</a> وأضف ما يعجبك</p></div>`;
    return;
  }
  g.innerHTML = items.map(a=>`
    <div class="card" onclick="location.href='anime.html?id=${Number(a.id)}'">
      <img src="${san(a.image||'https://via.placeholder.com/300x400/1a1535/ffcc00?text=Sido')}" alt="${san(a.name||'')}">
      <div class="card-body">
        <div class="card-title">${san(a.name||'بدون عنوان')}</div>
        <div class="card-meta">${san(a.genre||'')} ${a.year?'· '+san(a.year):''}</div>
        <div class="btns">
          <button class="watch-btn" onclick="event.stopPropagation();location.href='anime.html?id=${Number(a.id)}'">▶ شاهد</button>
          <button class="rm-btn" onclick="event.stopPropagation();rm(${Number(a.id)},this.closest('.card'))">🗑</button>
        </div>
      </div>
    </div>`).join("");

  window.rm = async(animeId,card)=>{
    await supabase.from("watchlist").delete().eq("user_id",uid).eq("anime_id",animeId);
    card.remove();
    if(!document.querySelector(".card")) load();
  };
}
load();
</script>
</body></html>
