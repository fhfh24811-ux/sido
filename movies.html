<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sido — الأفلام</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/navbar.css">
<style>
body{background:#0a0816;color:#f0eeff;margin:0;font-family:'Tajawal',sans-serif}
.page-hero{padding:36px 4% 28px;border-bottom:1px solid rgba(255,204,0,.12);background:linear-gradient(135deg,#0f0b20,#1a1035)}
.page-hero h1{font-size:26px;font-weight:800;color:#ffcc00;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.page-hero p{color:#887aaa;font-size:14px}
.content-wrap{padding:28px 4% 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:18px}
.card{background:#1a1535;border-radius:14px;overflow:hidden;border:1px solid rgba(124,58,237,.22);cursor:pointer;transition:.25s;position:relative}
.card:hover{transform:translateY(-7px);border-color:#ffcc00;box-shadow:0 16px 32px rgba(0,0,0,.5),0 0 18px rgba(255,204,0,.15)}
.card::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0;border-color:#ffcc00 transparent transparent transparent;transition:.22s}
.card:hover::after{border-width:20px 20px 0 0}
.card img{width:100%;height:260px;object-fit:cover;display:block;transition:.3s}
.card:hover img{transform:scale(1.04)}
.card-ov{position:absolute;inset:0 0 85px 0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:.22s}
.card:hover .card-ov{opacity:1}
.play{width:52px;height:52px;background:#ffcc00;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#000;transform:scale(.8);transition:.22s}
.card:hover .play{transform:scale(1)}
.card-rating{position:absolute;top:9px;left:9px;background:rgba(0,0,0,.85);color:#ffcc00;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;z-index:2}
.card-body{padding:12px 14px}
.card-title{font-size:14px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:#887aaa;margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap}
.card-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;background:linear-gradient(90deg,#ffcc00,#ff9900);color:#000;border:none;border-radius:22px;font-weight:700;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.2s;clip-path:polygon(0 0,93% 0,100% 50%,93% 100%,0 100%)}
.card-btn:hover{transform:scale(1.03)}
.empty{text-align:center;padding:80px 20px;color:#887aaa;grid-column:1/-1}
.empty i{font-size:60px;color:#221a40;display:block;margin-bottom:14px}
</style>
</head>
<body>
<div class="page-hero">
  <h1><i class="fas fa-video"></i> الأفلام</h1>
  <p>أفضل أفلام الأنمي والكرتون مدبلجة ومترجمة بجودة عالية</p>
</div>
<div class="content-wrap">
  <div class="grid" id="movGrid">
    <div class="empty"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>
  </div>
</div>
<script type="module">
import { supabase } from "../backend/supabase.js";
import "../js/navbar.js";
function san(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML;}
(async()=>{
  const {data}=await supabase.from("animes").select("*").ilike("genre","%أفلام%").order("created_at",{ascending:false});
  const g=document.getElementById("movGrid");
  g.innerHTML=(data||[]).length?(data||[]).map(a=>`
    <div class="card" onclick="location.href='anime.html?id=${Number(a.id)}'">
      ${a.rating?`<div class="card-rating">⭐ ${san(a.rating)}</div>`:''}
      <img src="${san(a.image||'https://via.placeholder.com/300x400/1a1535/ffcc00?text=Sido')}" alt="${san(a.name||'')}">
      <div class="card-ov"><div class="play">▶</div></div>
      <div class="card-body">
        <div class="card-title">${san(a.name||'بدون عنوان')}</div>
        <div class="card-meta">${a.year?`<span>📅 ${san(a.year)}</span>`:''} ${a.duration?`<span>⏱ ${san(a.duration)}</span>`:''}</div>
        <button class="card-btn" onclick="event.stopPropagation();location.href='anime.html?id=${Number(a.id)}'">▶ مشاهدة</button>
      </div>
    </div>`).join("")
  :`<div class="empty"><i class="fas fa-film"></i><h3 style="color:#887aaa;margin-bottom:8px">لا توجد أفلام حالياً</h3><p>تابع التحديثات قريباً</p></div>`;
})();
</script>
</body></html>
