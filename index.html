<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sido — أنمي ومسلسلات</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/navbar.css">
<style>
body{background:#070510;color:#f0eeff;margin:0;font-family:'Tajawal',sans-serif;overflow-x:hidden}

/* HERO */
.hero{position:relative;height:460px;margin:18px 4%;border-radius:18px;overflow:hidden;border:2px solid rgba(255,204,0,.18);box-shadow:0 0 40px rgba(109,40,217,.2)}
.hero-slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .9s}
.hero-slide.active{opacity:1}
.hero-ov{position:absolute;bottom:0;left:0;right:0;padding:36px 40px;background:linear-gradient(to top,rgba(0,0,0,.97) 0%,transparent 100%)}
.hero-badges{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.hero-badge{padding:4px 11px;background:rgba(255,204,0,.12);border:1px solid rgba(255,204,0,.35);color:#ffcc00;border-radius:20px;font-size:12px;font-weight:700}
.hero-ov h1{font-size:34px;font-weight:900;color:#ffcc00;margin-bottom:8px;text-shadow:0 0 16px rgba(255,204,0,.3)}
.hero-ov p{font-size:14px;color:#bbb;margin-bottom:18px;max-width:520px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.h-btn{padding:11px 24px;background:linear-gradient(90deg,#ffcc00,#ff9900);color:#000;border:none;border-radius:26px;font-weight:700;font-size:14px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:7px;clip-path:polygon(0 0,94% 0,100% 50%,94% 100%,0 100%)}
.h-btn:hover{transform:scale(1.04)}
.h-btn-o{padding:10px 20px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:26px;font-weight:700;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:7px}
.h-btn-o:hover{border-color:#ffcc00;color:#ffcc00}
.slider-dots{position:absolute;bottom:16px;right:36px;display:flex;gap:7px}
.sdot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.28);border:none;cursor:pointer;transition:.3s}
.sdot.active{background:#ffcc00;width:24px;border-radius:8px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:24px 4%}
.stat{background:#1a1535;border:1px solid rgba(124,58,237,.22);border-radius:13px;padding:16px;text-align:center;cursor:pointer;transition:.22s}
.stat:hover{border-color:#ffcc00;transform:translateY(-3px)}
.stat i{font-size:28px;color:#ffcc00;display:block;margin-bottom:7px}
.stat h3{font-size:22px;font-weight:800;margin-bottom:3px}
.stat p{font-size:12px;color:#887aaa}

/* FILTER */





/* SECTION */
.sec{margin:0 4% 36px}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.sec-title{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:800;color:#ffcc00}
.sec-title::before{content:'';width:4px;height:22px;background:linear-gradient(to bottom,#ffcc00,#7c3aed);border-radius:3px;clip-path:polygon(0 0,100% 0,100% 75%,75% 100%,0 100%)}
.view-all{color:#fff;text-decoration:none;padding:6px 14px;border:1px solid rgba(255,204,0,.3);border-radius:18px;font-size:13px;font-weight:600;transition:.18s}
.view-all:hover{background:rgba(255,204,0,.1);color:#ffcc00}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px}
.card{background:#1a1535;border-radius:14px;overflow:hidden;border:1px solid rgba(124,58,237,.22);cursor:pointer;transition:.26s;position:relative}
.card:hover{transform:translateY(-7px) scale(1.02);border-color:#ffcc00;box-shadow:0 16px 32px rgba(0,0,0,.4),0 0 16px rgba(255,204,0,.15)}
.card::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0;border-color:#ffcc00 transparent transparent transparent;transition:.22s}
.card:hover::after{border-width:18px 18px 0 0}
.card img{width:100%;height:250px;object-fit:cover;display:block;transition:.32s}
.card:hover img{transform:scale(1.04)}
.card-ov{position:absolute;inset:0 0 82px 0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:.22s}
.card:hover .card-ov{opacity:1}
.play{width:50px;height:50px;background:#ffcc00;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#000;transform:scale(.8);transition:.22s}
.card:hover .play{transform:scale(1)}
.c-rating{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.85);color:#ffcc00;font-size:11px;font-weight:700;padding:3px 8px;border-radius:18px;z-index:2}
.c-status{position:absolute;top:8px;right:8px;background:#e53e3e;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:18px;z-index:2;clip-path:polygon(0 0,92% 0,100% 50%,92% 100%,0 100%)}
.card-body{padding:11px 13px}
.card-name{font-size:14px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:#887aaa;margin-bottom:9px;display:flex;gap:7px;flex-wrap:wrap}
.card-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px;background:linear-gradient(90deg,#ffcc00,#ff9900);color:#000;border:none;border-radius:20px;font-weight:700;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:.18s;clip-path:polygon(0 0,93% 0,100% 50%,93% 100%,0 100%)}
.card-btn:hover{transform:scale(1.03)}

/* PROMO */








.empty{text-align:center;padding:60px 20px;color:#887aaa;grid-column:1/-1}
.empty i{font-size:60px;color:#221a40;display:block;margin-bottom:14px}

@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .hero{height:300px;margin:10px 3%}
  .hero-ov h1{font-size:22px}
  .hero-ov{padding:18px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .sec,.stats,.filters,
}
</style>
</head>
<body>

<div class="hero" id="heroSlider">
  <div class="hero-slide active" style="background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),url('https://via.placeholder.com/1400x500/3b0764/ffcc00?text=SIDO+ANIME') center/cover;">
    <div class="hero-ov">
      <div class="hero-badges">
        <span class="hero-badge">⚡ رائج الآن</span>
        <span class="hero-badge">⭐ 9.2</span>
        <span class="hero-badge">مدبلج</span>
      </div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
          <i class="fas fa-dragon" style="font-size:48px;color:#ffcc00;text-shadow:0 0 20px #ffcc00,0 0 40px #ff6600;animation:dragonGlow 2s ease-in-out infinite"></i>
          <h1 style="margin:0">مرحباً في Sido ⚡</h1>
        </div>
        <style>@keyframes dragonGlow{0%,100%{transform:scale(1) rotate(0deg);filter:drop-shadow(0 0 10px #ffcc00)}50%{transform:scale(1.1) rotate(5deg);filter:drop-shadow(0 0 25px #ff6600)}}</style>
      <p>شاهد الأنمي والمسلسلات واكسب نقاطاً حقيقية مع كل حلقة</p>
      <div class="hero-btns">
        <button class="h-btn"><i class="fas fa-play"></i> ابدأ المشاهدة</button>
        <button class="h-btn-o" onclick="location.href='./pages/register.html'"><i class="fas fa-star"></i> انضم مجاناً</button>
      </div>
    </div>
  </div>
  <div class="slider-dots"><button class="sdot active"></button><button class="sdot"></button><button class="sdot"></button></div>
</div>

<div class="stats">
  <div class="stat"><i class="fas fa-film"></i><h3 id="st-total">0</h3><p>أنمي متاح</p></div>
  <div class="stat"><i class="fas fa-list"></i><h3 id="st-eps">0</h3><p>حلقة</p></div>
  <div class="stat"><i class="fas fa-star"></i><h3 id="st-rated">0</h3><p>أعلى تقييماً</p></div>
  <div class="stat"><i class="fas fa-fire"></i><h3 id="st-new">0</h3><p>أضيف حديثاً</p></div>
</div>


<div class="sec">
  <div class="sec-head">
    <div class="sec-title"><i class="fas fa-fire"></i> جميع الأنمي</div>
    <a href="./pages/anime.html" class="view-all">عرض الكل <i class="fas fa-arrow-left"></i></a>
  </div>
  <div class="grid" id="animeGrid">
    <div class="empty"><i class="fas fa-spinner fa-spin fa-2x"></i><p style="margin-top:14px">جاري التحميل...</p></div>
  </div>
</div>

      <div class="promo-step"><span>2</span> شاهد وراكم</div>
      <div class="promo-step"><span>3</span> استبدل بمكافآت</div>
    </div>
  </div>
  <button class="h-btn" onclick="location.href='./pages/register.html'"><i class="fas fa-star"></i> ابدأ الآن</button>
</div>

<script type="module">
import { supabase } from "./backend/supabase.js";
import { getAllAnime } from "./backend/anime_api.js";
import "./js/navbar.js";

let all = [];

function san(s) {
  const d = document.createElement("div");
  d.textContent = String(s || "");
  return d.innerHTML;
}

function card(a) {
  const img = san(a.image || 'https://via.placeholder.com/300x420/1a1535/ffcc00?text=SIDO');
  const id  = Number(a.id);
  return `<div class="card" onclick="location.href='./pages/anime.html?id=${id}'">
    ${a.rating ? `<div class="c-rating">⭐ ${san(a.rating)}</div>` : ''}
    ${a.status ? `<div class="c-status">${san(a.status)}</div>` : ''}
    <img src="${img}" alt="${san(a.name)}" loading="lazy">
    <div class="card-ov"><div class="play">▶</div></div>
    <div class="card-body">
      <div class="card-name">${san(a.name)}</div>
      <div class="card-meta">
        ${a.genre ? `<span>${san(a.genre)}</span>` : ''}
        ${a.year  ? `<span>📅 ${san(a.year)}</span>` : ''}
      </div>
      <button class="card-btn" onclick="event.stopPropagation();location.href='./pages/anime.html?id=${id}'">
        ▶ مشاهدة
      </button>
    </div>
  </div>`;
}

function render(items) {
  const g = document.getElementById("animeGrid");
  g.innerHTML = items.length
    ? items.map(card).join("")
    : `<div class="empty"><i class="fas fa-box-open"></i><p>لا يوجد محتوى حالياً</p></div>`;
}


(async () => {
  try {
    all = await getAllAnime();
    // إحصاءات
    document.getElementById("st-total").textContent = all.length;
    document.getElementById("st-new").textContent   = all.slice(0,5).length;
    const rated = all.filter(a => a.rating >= 8);
    document.getElementById("st-rated").textContent = rated.length;
    // عدد الحلقات
    const { count } = await supabase.from("episodes").select("*", { count:"exact", head:true });
    document.getElementById("st-eps").textContent = count || 0;
    render(all);
  } catch(e) {
    console.error(e);
  }
})();
</script>
</body>
</html>
